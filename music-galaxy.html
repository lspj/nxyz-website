<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>共鸣星海 | 内心宇宙</title>
    <style>
      /* 基础重置与变量 */
      :root {
        --primary-color: #6c63ff;
        --secondary-color: #ff6584;
        --dark-bg: #0f0f23;
        --light-bg: #f8f9fa;
        --text-primary: #e8eaed;
        --text-secondary: #b0b7c3;
        --accent-1: #36d1dc;
        --accent-2: #5b86e5;
        --card-bg: rgba(30, 30, 46, 0.7);
        --transition: all 0.3s ease;
        --border-radius: 12px;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Quicksand", sans-serif;
        background-color: var(--dark-bg);
        color: var(--text-primary);
        line-height: 1.6;
        overflow-x: hidden;
        background-image:
          radial-gradient(
            circle at 10% 20%,
            rgba(108, 99, 255, 0.1) 0%,
            transparent 20%
          ),
          radial-gradient(
            circle at 90% 80%,
            rgba(255, 101, 132, 0.1) 0%,
            transparent 20%
          );
        min-height: 100vh;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
      }

      /* 导航栏 */
      .main-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 0;
        position: relative;
        z-index: 100;
      }

      .nav-brand {
        font-size: 1.8rem;
        font-weight: 600;
        background: linear-gradient(
          90deg,
          var(--primary-color),
          var(--accent-1)
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .nav-links {
        display: flex;
        list-style: none;
        gap: 30px;
      }

      .nav-links a {
        color: var(--text-secondary);
        text-decoration: none;
        font-weight: 500;
        transition: var(--transition);
        padding: 8px 0;
        position: relative;
      }

      .nav-links a:hover,
      .nav-links a.active {
        color: var(--text-primary);
      }

      .nav-links a.active::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: var(--primary-color);
        border-radius: 2px;
      }

      .menu-toggle {
        display: none;
        background: none;
        border: none;
        color: var(--text-primary);
        font-size: 1.5rem;
        cursor: pointer;
      }

      /* 主内容区 */
      .hero {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 60px;
        align-items: center;
        padding: 80px 0;
        min-height: 80vh;
      }

      .hero-text h1 {
        font-size: 3.2rem;
        line-height: 1.2;
        margin-bottom: 20px;
      }

      .highlight {
        background: linear-gradient(
          90deg,
          var(--primary-color),
          var(--secondary-color)
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        position: relative;
      }

      .subtitle {
        font-size: 1.2rem;
        color: var(--text-secondary);
        margin-bottom: 30px;
      }

      .hero-text p {
        margin-bottom: 30px;
        font-size: 1.1rem;
      }

      .cta-buttons {
        display: flex;
        gap: 20px;
        margin-top: 30px;
      }

      .btn {
        padding: 14px 28px;
        border-radius: var(--border-radius);
        text-decoration: none;
        font-weight: 600;
        transition: var(--transition);
        display: inline-block;
        text-align: center;
      }

      .btn.primary {
        background: linear-gradient(
          90deg,
          var(--primary-color),
          var(--accent-1)
        );
        color: white;
        box-shadow: var(--shadow);
      }

      .btn.secondary {
        background: transparent;
        color: var(--text-primary);
        border: 2px solid var(--primary-color);
      }

      .btn:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
      }

      .hero-visual {
        position: relative;
        height: 400px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .floating-shapes {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .shape {
        position: absolute;
        border-radius: 50%;
        opacity: 0.7;
      }

      .shape-1 {
        width: 200px;
        height: 200px;
        background: radial-gradient(
          circle,
          var(--primary-color),
          transparent 70%
        );
        top: 20%;
        left: 10%;
        animation: float 6s ease-in-out infinite;
      }

      .shape-2 {
        width: 150px;
        height: 150px;
        background: radial-gradient(
          circle,
          var(--secondary-color),
          transparent 70%
        );
        top: 50%;
        right: 10%;
        animation: float 8s ease-in-out infinite reverse;
      }

      .shape-3 {
        width: 100px;
        height: 100px;
        background: radial-gradient(circle, var(--accent-1), transparent 70%);
        bottom: 10%;
        left: 30%;
        animation: float 7s ease-in-out infinite 1s;
      }

      /* 特色空间卡片 */
      .featured-spaces {
        padding: 80px 0;
      }

      .featured-spaces h2 {
        text-align: center;
        font-size: 2.5rem;
        margin-bottom: 50px;
      }

      .space-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 30px;
      }

      .space-card {
        background: var(--card-bg);
        border-radius: var(--border-radius);
        padding: 30px;
        transition: var(--transition);
        cursor: pointer;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .space-card:hover {
        transform: translateY(-10px);
        border-color: var(--primary-color);
        box-shadow: var(--shadow);
      }

      .card-icon {
        font-size: 2.5rem;
        margin-bottom: 20px;
      }

      .space-card h3 {
        font-size: 1.5rem;
        margin-bottom: 15px;
      }

      .space-card p {
        color: var(--text-secondary);
        font-size: 0.95rem;
      }

      /* 幽默区域 */
      .humor-section {
        padding: 60px 0;
        display: flex;
        justify-content: center;
      }

      .humor-bubble {
        background: linear-gradient(
          135deg,
          rgba(108, 99, 255, 0.1),
          rgba(255, 101, 132, 0.1)
        );
        border-radius: var(--border-radius);
        padding: 30px;
        max-width: 600px;
        border-left: 5px solid var(--secondary-color);
        position: relative;
        overflow: hidden;
      }

      .humor-bubble::before {
        content: "✨";
        position: absolute;
        top: 10px;
        right: 10px;
        font-size: 1.5rem;
      }

      .humor-bubble p:first-child {
        font-weight: 600;
        margin-bottom: 15px;
        color: var(--secondary-color);
      }

      .humor-bubble ul {
        margin: 20px 0;
        padding-left: 20px;
      }

      .humor-bubble li {
        margin-bottom: 8px;
        position: relative;
      }

      .humor-note {
        font-style: italic;
        font-size: 0.9rem;
        color: var(--text-secondary);
        margin-top: 20px;
        text-align: right;
      }

      /* 页脚 */
      footer {
        text-align: center;
        padding: 30px 0;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        margin-top: 60px;
        color: var(--text-secondary);
        font-size: 0.9rem;
      }

      footer p:first-child {
        margin-bottom: 10px;
      }

      /* 响应式设计 */
      @media (max-width: 992px) {
        .hero {
          grid-template-columns: 1fr;
          gap: 40px;
          padding: 40px 0;
        }

        .hero-text h1 {
          font-size: 2.5rem;
        }

        .nav-links {
          display: none;
        }

        .menu-toggle {
          display: block;
        }

        .nav-links.active {
          display: flex;
          flex-direction: column;
          position: absolute;
          top: 100%;
          left: 0;
          width: 100%;
          background: var(--dark-bg);
          padding: 20px;
          border-radius: var(--border-radius);
          box-shadow: var(--shadow);
        }
      }

      /* ==================== 【共鸣星海】新增样式 ==================== */
      /* 将此段代码追加到 style.css 文件的末尾 */

      /* 星星详细信息面板 */
      .star-detail-panel {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
        max-width: 500px;
        max-height: 80vh;
        background: var(--card-bg);
        backdrop-filter: blur(20px) saturate(180%);
        border-radius: var(--border-radius);
        border: 1px solid rgba(108, 99, 255, 0.3);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        z-index: 1000;
        overflow-y: auto;
        animation: fadeInUp 0.4s ease-out;
        color: var(--text-primary);
      }

      .panel-header {
        padding: 25px 25px 15px 25px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        position: relative;
        background: linear-gradient(
          to right,
          rgba(108, 99, 255, 0.1),
          transparent
        );
      }
      .panel-header h3 {
        font-size: 1.6rem;
        margin-bottom: 5px;
        color: var(--text-primary);
      }
      .song-artist {
        color: var(--accent-1);
        font-size: 0.95rem;
      }
      .close-panel-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(255, 255, 255, 0.1);
        border: none;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        color: var(--text-primary);
        font-size: 1.5rem;
        line-height: 1;
        cursor: pointer;
        transition: var(--transition);
      }
      .close-panel-btn:hover {
        background: var(--secondary-color);
        transform: rotate(90deg);
      }

      .panel-body {
        padding: 25px;
      }
      .panel-body > div {
        margin-bottom: 25px;
      }

      /* 投稿者区域 */
      .contributor-header {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 15px;
      }
      .contributor-avatar {
        font-size: 2.5rem;
      }
      .contributor-header h4 {
        font-size: 1.2rem;
        margin-bottom: 5px;
      }
      .upload-time {
        font-size: 0.85rem;
        color: var(--text-secondary);
      }
      .contributor-intro {
        background: rgba(255, 255, 255, 0.05);
        padding: 15px;
        border-radius: 10px;
        line-height: 1.6;
        font-style: italic;
        border-left: 3px solid var(--accent-1);
      }

      /* 社交标签 */
      .social-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 10px;
      }
      .social-tag {
        background: rgba(255, 101, 132, 0.15);
        color: var(--secondary-color);
        padding: 6px 12px;
        border-radius: 15px;
        font-size: 0.8rem;
      }

      /* 联系方式区域 */
      .contact-info {
        background: rgba(54, 209, 220, 0.1);
        padding: 12px 15px;
        border-radius: 8px;
        word-break: break-all;
        margin: 15px 0;
        font-family: monospace;
        border: 1px dashed var(--accent-1);
      }
      .action-btn {
        width: 100%;
        padding: 12px;
        margin-bottom: 10px;
        background: linear-gradient(
          90deg,
          var(--primary-color),
          var(--accent-1)
        );
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
      }
      .action-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 7px 15px rgba(108, 99, 255, 0.3);
      }
      .action-btn.secondary {
        background: transparent;
        border: 2px solid var(--primary-color);
        color: var(--primary-color);
      }
      .action-btn.secondary:hover {
        background: rgba(108, 99, 255, 0.1);
      }

      /* 歌曲信息 */
      .song-info-section p {
        margin-bottom: 8px;
        font-size: 0.9rem;
        color: var(--text-secondary);
      }
      .song-info-section strong {
        color: var(--text-primary);
      }

      /* 响应式调整 */
      @media (max-width: 768px) {
        .star-detail-panel {
          width: 95%;
          max-height: 85vh;
        }
        .panel-header,
        .panel-body {
          padding: 20px;
        }
      }
      /* 在 music-galaxy.html 的 style 标签内，或 style.css 中添加 */
      .background-star {
        opacity: 0.7;
      }
      .background-star:hover {
        opacity: 1;
      }

      /* ==================== 【共鸣星海】创建新星功能新增样式 ==================== */

      /* 创建新星入口按钮 */
      .create-star-entry {
        z-index: 20; /* 确保在最上层 */
      }
      .create-entry-btn {
        background: linear-gradient(
          135deg,
          var(--primary-color),
          var(--accent-2)
        );
        color: white;
        border: none;
        border-radius: 25px;
        padding: 12px 25px;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(108, 99, 255, 0.4);
        transition: all 0.3s ease;
        animation: pulse-gentle 2s infinite;
      }
      .create-entry-btn:hover {
        transform: translateY(-3px) scale(1.05);
        box-shadow: 0 12px 25px rgba(108, 99, 255, 0.6);
      }
      @keyframes pulse-gentle {
        0%,
        100% {
          box-shadow: 0 8px 20px rgba(108, 99, 255, 0.4);
        }
        50% {
          box-shadow: 0 8px 25px rgba(108, 99, 255, 0.7);
        }
      }

      /* 创建表单样式 (复用 .star-detail-panel 的基础样式) */
      #starDetailPanel .form-section {
        margin-bottom: 25px;
        padding-bottom: 20px;
        border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
      }
      #starDetailPanel .form-section:last-of-type {
        border-bottom: none;
      }
      #starDetailPanel .form-section h4 {
        margin-bottom: 15px;
        color: var(--accent-1);
        font-size: 1.1rem;
      }
      .form-group {
        margin-bottom: 15px;
      }
      .form-group label {
        display: block;
        margin-bottom: 5px;
        font-size: 0.9rem;
        color: var(--text-secondary);
      }
      .form-group input[type="text"],
      .form-group textarea {
        width: 100%;
        padding: 10px 15px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(108, 99, 255, 0.3);
        border-radius: 8px;
        color: var(--text-primary);
        font-family: "Quicksand", sans-serif;
        transition: var(--transition);
      }
      .form-group input[type="text"]:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: var(--primary-color);
        background: rgba(108, 99, 255, 0.1);
      }
      .form-group textarea {
        resize: vertical;
        min-height: 60px;
      }
      .radio-group {
        display: flex;
        gap: 20px;
        margin-top: 5px;
      }
      .radio-group label {
        display: flex;
        align-items: center;
        font-size: 0.9rem;
        cursor: pointer;
      }
      .radio-group input[type="radio"] {
        margin-right: 8px;
      }
      .form-group small {
        display: block;
        margin-top: 5px;
        font-size: 0.8rem;
        color: var(--text-secondary);
        opacity: 0.8;
      }
      .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 15px;
        margin-top: 25px;
      }

      /* 基础动画 */
      @keyframes float {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-20px) scale(1.05);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* 页面进入动画 */
      .hero-text,
      .space-card,
      .humor-bubble {
        animation: fadeInUp 0.8s ease-out;
      }

      .space-card:nth-child(2) {
        animation-delay: 0.1s;
      }

      .space-card:nth-child(3) {
        animation-delay: 0.2s;
      }

      .space-card:nth-child(4) {
        animation-delay: 0.3s;
      }
    </style>
    <style>
      /* 原有内联样式保持不变 */
      .galaxy-container {
        padding: 20px 0;
        height: calc(100vh - 120px);
        overflow: hidden;
        position: relative;
      }

      .galaxy-header {
        text-align: center;
        margin-bottom: 30px;
        z-index: 10;
        position: relative;
        background: rgba(15, 15, 35, 0.7);
        padding: 15px;
        border-radius: var(--border-radius);
        backdrop-filter: blur(5px);
      }

      .galaxy-header h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
      }

      .galaxy-controls {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 20px;
        flex-wrap: wrap;
        z-index: 10;
        position: relative;
      }

      .control-btn {
        padding: 10px 20px;
        background: var(--card-bg);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        color: var(--text-primary);
        cursor: pointer;
        transition: var(--transition);
        font-size: 0.9rem;
      }

      .control-btn.active,
      .control-btn:hover {
        background: var(--primary-color);
        transform: translateY(-2px);
      }

      .galaxy-canvas-container {
        position: absolute;
        top: 180px;
        left: 0;
        width: 100%;
        height: calc(100% - 200px);
        overflow: hidden;
        border-radius: var(--border-radius);
        border: 1px solid rgba(108, 99, 255, 0.2);
      }

      #galaxyCanvas {
        width: 3000px;
        height: 3000px;
        position: relative;
        background: rgba(5, 5, 15, 0.95);
        cursor: grab;
        transition: transform 0.1s linear;
      }
      #galaxyCanvas:active {
        cursor: grabbing;
      }

      .star {
        position: absolute;
        border-radius: 50%;
        cursor: pointer;
        transition: var(--transition);
        transform-origin: center;
      }
      .star:hover {
        transform: scale(1.8);
        z-index: 5;
      }
      .star.playing {
        animation: pulse 2s infinite !important;
        z-index: 100 !important;
      }

      #nowPlayingSimple {
        background: rgba(20, 20, 35, 0.95);
        border-radius: var(--border-radius);
        padding: 12px 20px;
        margin: 15px auto;
        backdrop-filter: blur(10px);
        border-left: 4px solid var(--primary-color);
        max-width: 800px;
        display: none;
        z-index: 10;
        position: relative;
      }

      .back-btn {
        display: inline-block;
        margin-top: 20px;
        color: var(--text-secondary);
        text-decoration: none;
        z-index: 10;
        position: relative;
        background: var(--card-bg);
        padding: 10px 20px;
        border-radius: 20px;
      }
      .back-btn:hover {
        color: var(--primary-color);
        border-color: var(--primary-color);
      }

      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 20px 5px hsla(60, 100%, 50%, 0.8);
        }
        50% {
          box-shadow: 0 0 30px 10px hsla(60, 100%, 50%, 0.9);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <nav class="main-nav">
        <div class="nav-brand">内心宇宙</div>
        <ul class="nav-links">
          <li><a href="../index.html">主页</a></li>
          <li><a href="music-galaxy.html" class="active">共鸣星海</a></li>
          <li><a href="anxiety-room.html">情绪空间</a></li>
          <li><a href="memory-drawers.html">记忆抽屉</a></li>
          <li><a href="portrait-lab.html">肖像实验室</a></li>
          <li><a href="about-me.html">关于我</a></li>
        </ul>
        <button class="menu-toggle">☰</button>
      </nav>

      <main class="galaxy-container">
        <div class="galaxy-header">
          <h1>共鸣星海</h1>
          <p>
            一片由无数同好用歌曲点亮的无限宇宙。点击星辰，聆听音乐，结识知音。
          </p>
        </div>

        <div class="galaxy-controls">
          <button class="control-btn active" data-filter="all">全部星辰</button>
          <button class="control-btn" data-filter="energy">活力节拍</button>
          <button class="control-btn" data-filter="quiet">静谧时光</button>
          <button class="control-btn" data-filter="social-tech">
            寻找技术同好
          </button>
          <button class="control-btn" data-filter="social-game">
            寻找游戏玩伴
          </button>
        </div>

        <div id="nowPlayingSimple" style="display: none">
          <div style="display: flex; align-items: center; gap: 12px">
            <span style="color: var(--primary-color); font-size: 1.2rem"
              >▶</span
            >
            <div>
              <div
                style="font-weight: 600; color: var(--text-primary)"
                id="currentSongSimple"
              >
                点击星星播放音乐
              </div>
              <div
                style="font-size: 0.8rem; color: var(--text-secondary)"
                id="currentArtistSimple"
              ></div>
            </div>
          </div>
        </div>

        <div class="galaxy-canvas-container">
          <div class="galaxy-canvas" id="galaxyCanvas"></div>
